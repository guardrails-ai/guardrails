# Managed by scripts/rollout_dependabot_config.py
# Minor + patch version updates group into one weekly PR per ecosystem;
# major bumps open individually. Security updates are grouped separately
# (applies-to: security-updates) so vulnerability fixes also collapse into
# a single PR per ecosystem instead of one PR per advisory.
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/server_ci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pip:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directories:
      - "/server_ci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
