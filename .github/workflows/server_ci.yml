name: Server CI

on:
    push:
      branches:
        - main
      paths:
        - guardrails/**
        - pyproject.toml
    workflow_dispatch:

jobs:
    build-test-server:
        runs-on: ubuntu-latest
        steps:
            - name: Check out head
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                persist-credentials: false

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
              with:
                platforms: linux/amd64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
              with:
                platforms: linux/amd64

            - name: Build Docker image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                context: .
                file: server_ci/Dockerfile
                platforms: linux/amd64
                push: false
                tags: guardrails:server-ci
                load: true
                secrets: |
                  GUARDRAILS_TOKEN=${{ secrets.GUARDRAILS_API_KEY }}

            - name: Start Docker container
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: |
                  docker run -d --name guardrails-container -p 8000:8000 -e OPENAI_API_KEY=$OPENAI_API_KEY guardrails:server-ci
        
            - name: Wait for Docker container to be ready
              run: |
                for i in {1..30}; do
                if docker exec guardrails-container curl -s http://localhost:8000/; then
                    echo "Server is up!"
                    break
                fi
                echo "Waiting for server..."
                sleep 5
                done
    
            - name: Run Pytest
              run: |
                pip install pytest pytest-asyncio openai ".[api]"
                pytest server_ci/tests
                docker stop guardrails-container
                docker rm guardrails-container